# Traefik (and similar) overlay: merge when your app runs on the same Docker host as Traefik.
#
#   docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# Adjust the external network name to match your setup (`docker network ls`).
# Match entrypoints and certresolver names to your Traefik static config.

services:
  web:
    networks:
      - default
      - traefik_public
    labels:
      traefik.enable: "true"
      traefik.http.routers.form-send.rule: "Host(`form-send.royadler.de`)"
      traefik.http.routers.form-send.entrypoints: websecure
      traefik.http.routers.form-send.tls: "true"
      traefik.http.routers.form-send.tls.certresolver: letsencrypt
      traefik.http.services.form-send.loadbalancer.server.port: "8000"

networks:
  traefik_public:
    external: true
    name: traefik
