services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Set true when TLS terminates at a reverse proxy (Traefik, Caddy, nginx)
      TRUST_PROXY: ${TRUST_PROXY:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SENDER: ${MAIL_SENDER}
      MAIL_SUBJECT: ${MAIL_SUBJECT:-}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-true}
      # Inbound addresses (comma/semicolon list; defaults to MAIL_SENDER if unset)
      MAIL_RECIPIENT: ${MAIL_RECIPIENT:-}
      # CSP frame-ancestors for embedding (default * in app if unset)
      FRAME_ANCESTORS: ${FRAME_ANCESTORS:-*}
      # false = hide form on direct host URL; iframe embeds still work
      ALLOW_HOST_LANDING_PAGE: ${ALLOW_HOST_LANDING_PAGE:-true}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    restart: unless-stopped
